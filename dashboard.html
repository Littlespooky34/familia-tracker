<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamiliaTrack — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #07070d;
    --bg2: #0e0e1a;
    --bg3: #151524;
    --accent: #4fffb0;
    --accent2: #ff4f8b;
    --sos: #ff3b30;
    --text: #eeeeff;
    --muted: #5a5a7a;
    --border: rgba(255,255,255,0.07);
    --card: rgba(255,255,255,0.03);
    --sidebar: 320px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    height: 56px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .topbar-sep { flex: 1; }
  .topbar-info {
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(79,255,176,0.4); }
    50% { box-shadow: 0 0 0 5px rgba(79,255,176,0); }
  }
  .btn-refresh {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-refresh:hover { background: rgba(79,255,176,0.08); border-color: rgba(79,255,176,0.3); }
  .btn-refresh.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tab-content::-webkit-scrollbar { width: 4px; }
  .tab-content::-webkit-scrollbar-track { background: transparent; }
  .tab-content::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

  /* ── FAMILY CARD ── */
  .member-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .member-card:hover { background: rgba(79,255,176,0.04); border-color: rgba(79,255,176,0.2); }
  .member-card.sos { border-color: rgba(255,59,48,0.4); background: rgba(255,59,48,0.04); }
  .member-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: #000;
    flex-shrink: 0;
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .member-time {
    font-size: 0.73rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .member-coords {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 3px;
  }
  .member-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .btn-maps {
    background: rgba(79,255,176,0.1);
    border: 1px solid rgba(79,255,176,0.2);
    color: var(--accent);
    padding: 5px 10px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.72rem;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-maps:hover { background: rgba(79,255,176,0.2); }

  /* ── HISTORY ITEM ── */
  .history-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .history-item.sos { border-color: rgba(255,59,48,0.3); }
  .hist-icon {
    width: 32px; height: 32px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    background: rgba(79,255,176,0.08);
  }
  .history-item.sos .hist-icon { background: rgba(255,59,48,0.1); }
  .hist-info { flex: 1; }
  .hist-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
  }
  .hist-time {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .hist-coords {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 3px;
  }
  .hist-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.72rem;
    font-weight: 600;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .hist-link:hover { opacity: 1; }

  /* ── EMPTY STATE ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px 20px;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon { font-size: 2.5rem; opacity: 0.4; }
  .empty-text { font-size: 0.85rem; line-height: 1.5; }

  /* ── MAP ── */
  .map-container {
    flex: 1;
    position: relative;
  }
  #map {
    width: 100%;
    height: 100%;
    background: var(--bg);
  }

  /* Dark map tiles */
  .leaflet-tile { filter: brightness(0.7) saturate(0.7) hue-rotate(180deg) invert(1); }
  .leaflet-container { background: var(--bg); }

  /* Custom markers */
  .custom-marker {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    color: #000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    border: 3px solid rgba(255,255,255,0.2);
    transition: transform 0.2s;
  }
  .custom-marker:hover { transform: scale(1.1); }
  .custom-marker.sos {
    background: var(--sos) !important;
    border-color: rgba(255,255,255,0.4);
    animation: sos-pulse 1s infinite;
  }
  @keyframes sos-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.6); }
    50% { box-shadow: 0 0 0 12px rgba(255,59,48,0); }
  }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    background: var(--bg2) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    border-radius: 12px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
  }
  .leaflet-popup-tip { background: var(--bg2) !important; }
  .popup-content { padding: 4px 0; }
  .popup-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 6px;
  }
  .popup-time { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }
  .popup-link {
    display: inline-block;
    background: rgba(79,255,176,0.1);
    color: var(--accent);
    padding: 5px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 600;
    transition: background 0.2s;
  }
  .popup-link:hover { background: rgba(79,255,176,0.2); }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    :root { --sidebar: 100%; }
    .main { flex-direction: column; }
    .sidebar { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
    .map-container { height: 55vh; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="logo">Familia<span>Track</span> <span style="color:var(--muted);font-size:0.7rem;font-weight:400">Dashboard</span></div>
  <div class="topbar-sep"></div>
  <div class="topbar-info">
    <div class="live-dot"></div>
    <span id="lastUpdate">Actualizando...</span>
  </div>
  <button class="btn-refresh" id="refreshBtn" onclick="loadAll()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Actualizar
  </button>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="tab active" id="tab-familia" onclick="switchTab('familia')">👨‍👩‍👧‍👦 Familia</div>
      <div class="tab" id="tab-historial" onclick="switchTab('historial')">📋 Historial</div>
    </div>
    <div class="tab-content" id="tabContent">
      <div class="empty">
        <div class="empty-icon">📡</div>
        <div class="empty-text">Cargando ubicaciones...</div>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div class="map-container">
    <div id="map"></div>
  </div>
</div>

<script>
const API = window.location.origin;
const COLORS = ['#4fffb0','#ff4f8b','#ffcc00','#4fc3ff','#b44fff','#ff894f','#4fff6e'];
let map, markers = {}, memberColors = {}, colorIdx = 0;
let currentTab = 'familia';
let locations = [], history = [];

// ── MAPA ──────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([-2.1894, -79.8891], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

function getColor(name) {
  if (!memberColors[name]) {
    memberColors[name] = COLORS[colorIdx % COLORS.length];
    colorIdx++;
  }
  return memberColors[name];
}

function updateMarkers(locs) {
  // Limpiar marcadores anteriores
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  if (locs.length === 0) return;

  const bounds = [];
  locs.forEach(loc => {
    const color = getColor(loc.name);
    const isSOS = loc.type === 'sos';
    const initial = loc.name.charAt(0).toUpperCase();
    const mapsLink = `https://maps.google.com/?q=${loc.latitude},${loc.longitude}`;

    const icon = L.divIcon({
      html: `<div class="custom-marker ${isSOS ? 'sos' : ''}" style="background:${isSOS ? 'var(--sos)' : color}">${initial}</div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      className: ''
    });

    const marker = L.marker([loc.latitude, loc.longitude], { icon })
      .addTo(map)
      .bindPopup(`
        <div class="popup-content">
          <div class="popup-name">${isSOS ? '🚨 ' : ''}${loc.name}</div>
          <div class="popup-time">🕐 ${loc.timestamp}</div>
          <a class="popup-link" href="${mapsLink}" target="_blank">📍 Abrir en Maps</a>
        </div>
      `);

    markers[loc.name] = marker;
    bounds.push([loc.latitude, loc.longitude]);
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
  }
}

function flyToMember(lat, lng, name) {
  map.flyTo([lat, lng], 16, { duration: 1.2 });
  if (markers[name]) markers[name].openPopup();
}

// ── DATA ──────────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const [locRes, histRes] = await Promise.all([
      fetch(`${API}/api/locations`),
      fetch(`${API}/api/history?limit=30`)
    ]);
    locations = await locRes.json();
    history = await histRes.json();

    updateMarkers(locations);
    renderTab();

    const now = new Date().toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('lastUpdate').textContent = `Actualizado ${now}`;
  } catch (e) {
    document.getElementById('lastUpdate').textContent = 'Error al cargar';
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── TABS ──────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  renderTab();
}

function renderTab() {
  if (currentTab === 'familia') renderFamilia();
  else renderHistorial();
}

function renderFamilia() {
  const c = document.getElementById('tabContent');
  if (locations.length === 0) {
    c.innerHTML = `<div class="empty">
      <div class="empty-icon">📡</div>
      <div class="empty-text">Nadie ha compartido ubicación todavía.<br>Pídeles que abran la app.</div>
    </div>`;
    return;
  }

  c.innerHTML = locations.map(loc => {
    const color = getColor(loc.name);
    const initial = loc.name.charAt(0).toUpperCase();
    const isSOS = loc.type === 'sos';
    const mapsLink = `https://maps.google.com/?q=${loc.latitude},${loc.longitude}`;
    return `
      <div class="member-card ${isSOS ? 'sos' : ''}" onclick="flyToMember(${loc.latitude}, ${loc.longitude}, '${loc.name}')">
        <div class="member-avatar" style="background:${isSOS ? 'var(--sos)' : color}">${initial}</div>
        <div class="member-info">
          <div class="member-name">${isSOS ? '🚨 ' : ''}${loc.name}</div>
          <div class="member-time">🕐 ${loc.timestamp}</div>
          <div class="member-coords">${Number(loc.latitude).toFixed(4)}, ${Number(loc.longitude).toFixed(4)}</div>
        </div>
        <div class="member-actions">
          <button class="btn-maps" onclick="event.stopPropagation(); window.open('${mapsLink}', '_blank')">
            🗺️ Maps
          </button>
        </div>
      </div>`;
  }).join('');
}

function renderHistorial() {
  const c = document.getElementById('tabContent');
  if (history.length === 0) {
    c.innerHTML = `<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">No hay historial de ubicaciones aún.</div>
    </div>`;
    return;
  }

  c.innerHTML = history.map(loc => {
    const isSOS = loc.type === 'sos';
    const mapsLink = `https://maps.google.com/?q=${loc.latitude},${loc.longitude}`;
    const color = getColor(loc.name);
    return `
      <div class="history-item ${isSOS ? 'sos' : ''}">
        <div class="hist-icon" style="background: ${isSOS ? 'rgba(255,59,48,0.1)' : `rgba(${hexToRgb(color)},0.1)`}">
          ${isSOS ? '🚨' : '📍'}
        </div>
        <div class="hist-info">
          <div class="hist-name" style="color:${isSOS ? 'var(--sos)' : color}">${loc.name}</div>
          <div class="hist-time">${loc.timestamp}</div>
          <div class="hist-coords">${Number(loc.latitude).toFixed(5)}, ${Number(loc.longitude).toFixed(5)}</div>
        </div>
        <a class="hist-link" href="${mapsLink}" target="_blank">↗ Maps</a>
      </div>`;
  }).join('');
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ── AUTO REFRESH (cada 60 seg) ────────────────────────────────────────────
initMap();
loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
